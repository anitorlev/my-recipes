<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אתר המתכונים של ענית</title>
    <style>
        :root { 
            --deep-purple: #4b304c; 
            --lavender: #d6cadd; 
            --olive: #7c7c4c; 
            --mustard: #c4a454;
            --bg: #f5f2f7; 
            --text: #2d1b2e; 
        }
        
        body { font-family: system-ui, -apple-system, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        
        .site-header { background: var(--deep-purple); color: #fff; padding: 40px 15px; text-align: center; border-bottom: 6px solid var(--mustard); margin-bottom: 30px; }
        .site-header h1 { margin: 0; font-size: 2.2rem; }

        .search-box { width: 100%; padding: 15px; border: 2px solid var(--lavender); border-radius: 50px; font-size: 16px; box-sizing: border-box; margin-bottom: 25px; outline: none; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        .categories { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; padding-bottom: 25px; }
        
        .category-btn { background: white; border: 2px solid var(--lavender); padding: 8px 16px; border-radius: 50px; cursor: pointer; white-space: nowrap; font-weight: 600; color: var(--deep-purple); transition: 0.3s; font-size: 0.9rem; }
        .category-btn.active { background: var(--deep-purple); color: white; border-color: var(--mustard); }

        #recipeList { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; margin-top: 20px; }

        .recipe-card { background: white; border-radius: 25px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.05); border: 1px solid var(--lavender); }
        .recipe-content { padding: 25px; }
        .recipe-title { font-weight: 800; font-size: 1.4rem; margin-bottom: 10px; color: var(--deep-purple); border-bottom: 2px solid var(--mustard); display: inline-block; }
        .recipe-category-tag { font-size: 0.85rem; color: var(--olive); font-weight: bold; margin-bottom: 15px; display: block; }
        .recipe-text { white-space: pre-wrap; font-size: 1.05rem; line-height: 1.7; color: #444; }

        .fab { position: fixed; bottom: 30px; left: 30px; width: 65px; height: 65px; background: var(--deep-purple); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 1000; border: 2px solid var(--mustard); }

        .add-pane { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 30px; box-shadow: 0 0 50px rgba(0,0,0,0.2); width: 90%; max-width: 500px; z-index: 1001; }
        .add-pane.open { display: block; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
        .overlay.open { display: block; }

        .add-pane h3 { color: var(--deep-purple); margin-top: 0; }
        .add-pane input, .add-pane textarea, .add-pane select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid var(--lavender); border-radius: 12px; font-family: inherit; box-sizing: border-box; }
        
        .add-btn { background: var(--olive); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .save-file-btn { background: var(--lavender); color: var(--deep-purple); border: 2px solid var(--deep-purple); padding: 10px; border-radius: 12px; width: 100%; cursor: pointer; font-size: 0.9rem; font-weight: bold; }
        .close-btn { background: none; border: none; color: #999; float: left; cursor: pointer; font-size: 1.5rem; }
    </style>
</head>
<body>

<header class="site-header">
    <h1>אתר המתכונים של ענית</h1>
</header>

<div class="container">
    <input type="text" id="searchInput" class="search-box" placeholder="חפשי מתכון או רכיב..." onkeyup="filterRecipes()">
    
    <div class="categories">
        <button class="category-btn active" onclick="filterCat('הכל', this)">הכל</button>
        <button class="category-btn" onclick="filterCat('לחמים ומאפים', this)">לחמים ומאפים</button>
        <button class="category-btn" onclick="filterCat('עוגות ועוגיות', this)">עוגות ועוגיות</button>
        <button class="category-btn" onclick="filterCat('תבשילים', this)">תבשילים</button>
        <button class="category-btn" onclick="filterCat('ארוחות קלות', this)">ארוחות קלות</button>
        <button class="category-btn" onclick="filterCat('סלטים וממרחים', this)">סלטים וממרחים</button>
        <button class="category-btn" onclick="filterCat('קינוחים', this)">קינוחים</button>
    </div>

    <main id="recipeList"></main>
</div>

<div class="fab" onclick="toggleAddPane()">+</div>
<div class="overlay" id="overlay" onclick="toggleAddPane()"></div>

<section class="add-pane" id="addPane">
    <button class="close-btn" onclick="toggleAddPane()">✕</button>
    <h3>הוספת מתכון חדש</h3>
    <input type="text" id="newTitle" placeholder="שם המתכון">
    <select id="newCategory">
        <option value="" disabled selected>בחרי קטגוריה</option>
        <option value="לחמים ומאפים">לחמים ומאפים</option>
        <option value="עוגות ועוגיות">עוגות ועוגיות</option>
        <option value="תבשילים">תבשילים</option>
        <option value="ארוחות קלות">ארוחות קלות</option>
        <option value="סלטים וממרחים">סלטים וממרחים</option>
        <option value="קינוחים">קינוחים</option>
    </select>
    <textarea id="newText" rows="6" placeholder="הדביקי את המתכון כאן..."></textarea>
    <button class="add-btn" onclick="addRecipe()">1. הוספה לאתר</button>
    <button class="save-file-btn" onclick="saveFullFile()">2. שמירה קבועה (הורדת קובץ)</button>
</section>

<script>
    function toggleAddPane() {
        document.getElementById('addPane').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('open');
    }

    function filterRecipes() {
        let val = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.recipe-card').forEach(card => {
            card.style.display = card.innerText.toLowerCase().includes(val) ? "flex" : "none";
        });
    }

    function filterCat(cat, btn) {
        document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.recipe-card').forEach(card => {
            card.style.display = (cat === 'הכל' || card.dataset.category === cat) ? "flex" : "none";
        });
    }

    function addRecipe() {
        const title = document.getElementById('newTitle').value;
        const cat = document.getElementById('newCategory').value;
        const text = document.getElementById('newText').value;
        if(!title || !cat || !text) return alert("ענית, חסר מידע!");

        const list = document.getElementById('recipeList');
        const card = document.createElement('div');
        card.className = 'recipe-card';
        card.dataset.category = cat;
        card.innerHTML = `<div class="recipe-content"><span class="recipe-category-tag">${cat}</span><div class="recipe-title">${title}</div><div class="recipe-text">${text}</div></div>`;
        list.prepend(card);
        
        toggleAddPane();
        alert("המתכון נוסף! כעת לחצי שוב על ה-+ ואז על כפתור 2 לשמירה.");
    }

    function saveFullFile() {
        document.getElementById('addPane').classList.remove('open');
        document.getElementById('overlay').classList.remove('open');
        
        const currentContent = document.documentElement.outerHTML;
        const blob = new Blob(['<!DOCTYPE html>\n' + currentContent], { type: 'text/html' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'index.html';
        a.click();
    }
</script>
</body>
</html>
